<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Salaj Sonar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#F8F7F4;--bg2:#EFEDE8;--bg3:#E5E3DD;--border:#DEDAD2;--text:#1A1917;--muted:#4A4744;--accent:#2B3D5C;--accent-dim:rgba(43,61,92,0.07)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 max(2rem,calc((100vw - 1000px)/2));height:58px;display:flex;align-items:center;justify-content:space-between;background:rgba(248,247,244,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text);letter-spacing:0.2em;text-decoration:none}
.nav-back{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);text-decoration:none;letter-spacing:0.08em;transition:color 0.2s}
.nav-back:hover{color:var(--text)}
main{max-width:700px;margin:0 auto;padding:100px 2rem 8rem}
.tag{font-family:'DM Mono',monospace;font-size:0.62rem;padding:0.22rem 0.65rem;background:var(--accent-dim);color:var(--accent);border-radius:3px;letter-spacing:0.04em}
.fade-in{opacity:0;transform:translateY(14px);transition:opacity 0.55s ease,transform 0.55s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

.post-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
.post-date{font-family:'DM Mono',monospace;font-size:0.63rem;color:var(--muted);letter-spacing:0.12em;opacity:0.55}
.post-tags{display:flex;gap:0.4rem;flex-wrap:wrap}
h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4.5vw,2.8rem);line-height:1.1;letter-spacing:-0.02em;color:var(--text);margin-bottom:2rem}
.divider{height:1px;background:var(--border);margin:2.5rem 0}
.body p{font-size:0.97rem;color:var(--muted);line-height:1.95;margin-bottom:1.4rem}
.body h3{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);margin-top:2.5rem;margin-bottom:0.7rem;line-height:1.2}
.body blockquote{border-left:3px solid var(--border);padding:0.8rem 1.2rem;margin:1.5rem 0;background:#fff;border-radius:0 4px 4px 0}
.body blockquote p{color:var(--muted);margin-bottom:0;font-style:italic}
.back-link{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);text-decoration:none;letter-spacing:0.08em;transition:color 0.2s}
.back-link:hover{color:var(--text)}
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">S · S</a>
  <a href="index.html" class="nav-back">← Blog</a>
</nav>
<main id="main">
  <div id="content"></div>
</main>
<script>
function fmt(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}
function block(b){
  if(b.type==='p') return `<p>${b.text}</p>`;
  if(b.type==='h3') return `<h3>${b.text}</h3>`;
  if(b.type==='blockquote') return `<blockquote><p>${b.text}</p></blockquote>`;
  return '';
}
const id = new URLSearchParams(location.search).get('id');
if(!id){ document.getElementById('content').innerHTML='<p style="color:var(--muted)">No post specified.</p>'; }
else {
  fetch('posts.json').then(r=>r.json()).then(posts=>{
    const p = posts.find(x=>x.id===id);
    if(!p){ document.getElementById('content').innerHTML='<p style="color:var(--muted)">Post not found.</p>'; return; }
    document.title = p.title+' — Salaj Sonar';
    document.getElementById('content').innerHTML = `
      <div class="post-meta fade-in">
        <span class="post-date">${fmt(p.date)}</span>
        <div class="post-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <h1 class="fade-in">${p.title}</h1>
      <div class="divider"></div>
      <div class="body fade-in">${p.content.map(block).join('')}</div>
      <div class="divider"></div>
      <a href="index.html" class="back-link">← All posts</a>`;
    const obs=new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('visible')),{threshold:0.06});
    document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
  }).catch(()=>{document.getElementById('content').innerHTML='<p style="color:var(--muted)">Failed to load post.</p>';});
}
</script>
</body></html>
